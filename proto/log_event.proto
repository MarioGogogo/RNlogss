syntax = "proto3";

package rnlogs;

message UserInfo {
  string id = 1;
  string name = 2;
  string email = 3;
}

message LogContext {
  string environment = 1;
  string release = 2;
}

message Breadcrumb {
  uint64 timestamp = 1;
  string category = 2;
  string message = 3;
}

message LogEvent {
  string id = 1;
  string type = 2;
  string source = 3;
  int32 level = 4;
  string level_name = 5;
  string message = 6;
  uint64 timestamp = 7;
  string data_json = 8;
  UserInfo user = 9;
  map<string, string> tags = 10;
  LogContext context = 11;
  repeated Breadcrumb breadcrumbs = 12;
}
